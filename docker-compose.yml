version: '3.8'

services:

  # ============================================================
  # PostgreSQL Database
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: library_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: library_db
      POSTGRES_USER: library_user
      POSTGRES_PASSWORD: library_pass
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - library_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library_user -d library_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ============================================================
  # Library System Application
  # ============================================================
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: library_app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SERVER_PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: library_db
      DB_USERNAME: library_user
      DB_PASSWORD: library_pass
      JWT_SECRET: VGhpc0lzQVZlcnlMb25nU2VjcmV0S2V5Rm9yTGlicmFyeVN5c3RlbTIwMjQ=
      JWT_EXPIRATION: 900000
      JWT_REFRESH_EXPIRATION: 604800000
      JAVA_OPTS: "-Xms256m -Xmx512m -Dspring.profiles.active=docker"
    ports:
      - "8080:8080"
    volumes:
      - app_logs:/app/logs
    networks:
      - library_network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

volumes:
  postgres_data:
    driver: local
  app_logs:
    driver: local

networks:
  library_network:
    driver: bridge
