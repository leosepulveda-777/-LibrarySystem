spring:
  application:
    name: LibrarySystem

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:library_db}
    username: ${DB_USERNAME:library_user}
    password: ${DB_PASSWORD:library_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: America/Bogota
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

application:
  jwt:
    secret: ${JWT_SECRET:VGhpc0lzQVZlcnlMb25nU2VjcmV0S2V5Rm9yTGlicmFyeVN5c3RlbTIwMjQ=}
    expiration: ${JWT_EXPIRATION:900000}        # 15 min en ms
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}  # 7 días en ms

  library:
    max-renewals: 2
    loan-days-physical: 14
    loan-days-digital: 7
    fine-per-day: 500.0  # Multa en pesos por día
    max-active-loans: 3
    max-active-reservations: 2
    reservation-expiry-days: 3

logging:
  level:
    root: INFO
    com.library: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/library-system.log

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    display-request-duration: true
  info:
    title: Library System API
    description: Sistema completo de gestión de biblioteca
    version: 1.0.0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
