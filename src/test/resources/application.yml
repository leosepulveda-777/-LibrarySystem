    secret: dGVzdFNlY3JldEtleUZvclRlc3RpbmdPbmx5MTIzNDU2Nzg=
    expiration: 900000
    refresh-expiration: 604800000
  library:
    max-renewals: 2
    loan-days-physical: 14
    loan-days-digital: 7
    fine-per-day: 500.0
    max-active-loans: 3
    max-active-reservations: 2
    reservation-expiry-days: 3
